<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spotify AI Discovery Agent</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#1DB954;--green-h:#1ed760;
  --bg:#121212;--sidebar:#000;
  --s1:#1e1e1e;--s2:#282828;--s3:#333;
  --text:#fff;--muted:#b3b3b3;
}
body{background:var(--bg);color:var(--text);font-family:'Circular','Helvetica Neue',Arial,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.app{display:flex;flex:1;overflow:hidden;min-height:0}

/* ── SIDEBAR ── */
#sidebar{width:240px;background:var(--sidebar);display:flex;flex-direction:column;gap:8px;padding:8px;flex-shrink:0;overflow:hidden}
.logo{display:flex;align-items:center;gap:10px;padding:14px 12px 10px}
.logo svg{width:32px;height:32px;fill:#1DB954;flex-shrink:0}
.logo span{font-size:15px;font-weight:700}
.nav-links{display:flex;flex-direction:column;gap:2px}
.nav-link{display:flex;align-items:center;gap:14px;padding:10px 12px;border-radius:6px;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;transition:color .1s;user-select:none}
.nav-link:hover,.nav-link.active{color:var(--text)}
.nav-link svg{width:20px;height:20px;flex-shrink:0;fill:currentColor}
.library-box{background:var(--s1);border-radius:8px;flex:1;padding:8px;overflow-y:auto;min-height:0}
.library-box::-webkit-scrollbar{width:4px}
.library-box::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px}
.lib-head{padding:8px 8px 10px;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.lib-item{display:flex;align-items:center;gap:10px;padding:7px 8px;border-radius:6px;cursor:pointer;transition:background .1s}
.lib-item:hover{background:var(--s2)}
.lib-art{width:40px;height:40px;border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px}
.lib-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lib-meta{font-size:11px;color:var(--muted);margin-top:1px}

/* ── MAIN ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
#topbar{height:64px;display:flex;align-items:center;gap:12px;padding:0 24px;background:rgba(18,18,18,.95);backdrop-filter:blur(10px);flex-shrink:0;z-index:10}
.nav-arrows{display:flex;gap:6px}
.nav-arrow{width:32px;height:32px;background:rgba(0,0,0,.7);border:none;border-radius:50%;color:var(--text);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.nav-arrow:hover{background:rgba(255,255,255,.1)}
.searchbar{flex:1;max-width:360px;display:flex;align-items:center;gap:8px;background:var(--s2);border-radius:20px;padding:8px 14px;border:1.5px solid transparent;transition:border-color .15s}
.searchbar:focus-within{border-color:var(--text)}
.searchbar svg{fill:var(--muted);width:16px;height:16px;flex-shrink:0}
.searchbar input{background:none;border:none;color:var(--text);font-size:14px;outline:none;width:100%;font-family:inherit}
.searchbar input::placeholder{color:var(--muted)}
.topbar-right{margin-left:auto;display:flex;align-items:center}
.alex-chip{display:flex;align-items:center;gap:8px;background:rgba(0,0,0,.5);border-radius:24px;padding:4px 14px 4px 4px}
.alex-av{width:34px;height:34px;border-radius:50%;background:#1DB954;color:#000;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.alex-name{font-size:13px;font-weight:700}

/* ── CONTENT ── */
#content{flex:1;overflow-y:auto;padding:0 24px 100px;scroll-behavior:smooth}
#content::-webkit-scrollbar{width:6px}
#content::-webkit-scrollbar-thumb{background:#535353;border-radius:3px}

/* ── HERO ── */
.hero{height:260px;border-radius:12px;margin:16px 0 24px;padding:28px 32px;display:flex;flex-direction:column;justify-content:flex-end;position:relative;overflow:hidden}
.hero-bg{position:absolute;inset:0;border-radius:12px}
.hero-inner{position:relative;z-index:1}
.hero-tag{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--green);margin-bottom:6px}
.hero-title{font-size:32px;font-weight:900;line-height:1.15;margin-bottom:6px;white-space:pre-line}
.hero-sub{font-size:14px;color:rgba(255,255,255,.8);margin-bottom:18px;max-width:460px;line-height:1.5}
.hero-btns{display:flex;gap:10px;align-items:center}
.btn-g{background:var(--green);color:#000;border:none;border-radius:24px;padding:11px 26px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s,transform .1s}
.btn-g:hover{background:var(--green-h);transform:scale(1.02)}
.btn-o{background:transparent;color:var(--text);border:1.5px solid rgba(255,255,255,.45);border-radius:24px;padding:10px 22px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:border-color .15s}
.btn-o:hover{border-color:var(--text)}

/* ── SECTIONS ── */
.section{margin-bottom:30px}
.section.hl{background:rgba(29,185,84,.05);border:1px solid rgba(29,185,84,.13);border-radius:12px;padding:16px}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-title{font-size:20px;font-weight:700}
.sec-link{font-size:12px;color:var(--muted);font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:.5px}
.sec-link:hover{color:var(--text);text-decoration:underline}

/* ── CARDS ── */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:14px}
.card{background:var(--s1);border-radius:8px;padding:14px;cursor:pointer;transition:background .15s;position:relative}
.card:hover{background:var(--s2)}
.card:hover .play-fab{opacity:1;transform:translateY(0)}
.card-art{width:100%;aspect-ratio:1;border-radius:6px;margin-bottom:10px;display:flex;align-items:center;justify-content:center;font-size:44px;position:relative;overflow:hidden}
.card-art.circle{border-radius:50%}
.play-fab{position:absolute;bottom:7px;right:7px;width:38px;height:38px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transform:translateY(8px);transition:opacity .2s,transform .2s;box-shadow:0 6px 16px rgba(0,0,0,.4)}
.play-fab svg{fill:#000;width:16px;height:16px;margin-left:2px}
.card-name{font-size:14px;font-weight:700;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-desc{font-size:12px;color:var(--muted);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* ── QUICK ROW ── */
.quick-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.qcard{background:var(--s2);border-radius:6px;display:flex;align-items:center;overflow:hidden;cursor:pointer;transition:background .15s;height:54px}
.qcard:hover{background:#333}
.q-art{width:54px;height:54px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px}
.q-name{padding:0 12px;font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── BANNERS ── */
.banner-ok{background:rgba(29,185,84,.07);border:1px solid rgba(29,185,84,.2);border-radius:10px;padding:14px 18px;margin-bottom:22px;display:flex;align-items:center;gap:14px}
.ok-icon{font-size:24px;flex-shrink:0}
.ok-title{font-size:14px;font-weight:700;color:var(--green);margin-bottom:2px}
.ok-sub{font-size:12px;color:var(--muted)}

/* ── NUDGE ── */
#nudge{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--green);color:#000;border-radius:12px;padding:14px 18px;max-width:500px;width:calc(100% - 40px);box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:300;display:flex;align-items:center;gap:14px;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none}
#nudge.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:all}
.nudge-ico{font-size:22px;flex-shrink:0}
.nudge-text{flex:1}
.nudge-title{font-size:14px;font-weight:700;margin-bottom:1px}
.nudge-sub{font-size:12px;opacity:.8}
.nudge-btns{display:flex;gap:7px;flex-shrink:0}
.nbtn{border:none;border-radius:20px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.nbtn-go{background:#000;color:#fff}
.nbtn-skip{background:rgba(0,0,0,.15);color:#000}

/* ── CHAT PANEL ── */
#chat-panel{position:fixed;top:0;right:-420px;width:420px;height:100vh;background:#0a0a0a;border-left:1px solid var(--s3);display:flex;flex-direction:column;z-index:250;transition:right .3s ease;box-shadow:-6px 0 24px rgba(0,0,0,.5)}
#chat-panel.open{right:0}
.chat-head{padding:14px 18px;border-bottom:1px solid var(--s3);display:flex;align-items:center;gap:10px;flex-shrink:0}
.chat-head-ico{width:34px;height:34px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.chat-head-info{flex:1}
.chat-head-title{font-size:14px;font-weight:700}
.chat-head-sub{font-size:11px;color:var(--muted);margin-top:1px}
.chat-x{background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;padding:2px;line-height:1}
.chat-x:hover{color:var(--text)}
.chat-prog{padding:8px 18px;border-bottom:1px solid var(--s3);display:flex;align-items:center;gap:10px;flex-shrink:0}
.cp-label{font-size:11px;color:var(--muted);font-weight:600;white-space:nowrap;min-width:70px}
.cp-track{flex:1;height:3px;background:var(--s3);border-radius:2px}
.cp-fill{height:3px;background:var(--green);border-radius:2px;width:0;transition:width .4s}
#chat-msgs{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:12px}
#chat-msgs::-webkit-scrollbar{width:4px}
#chat-msgs::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px}
.msg{display:flex;gap:8px;align-items:flex-end}
.msg.agent{align-self:flex-start;max-width:92%}
.msg.user{align-self:flex-end;max-width:85%;flex-direction:row-reverse}
.msg-av{width:26px;height:26px;border-radius:50%;background:var(--green);color:#000;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.msg-bbl{padding:10px 13px;border-radius:16px;font-size:13px;line-height:1.6}
.msg.agent .msg-bbl{background:var(--s2);border-bottom-left-radius:4px}
.msg.user .msg-bbl{background:var(--green);color:#000;font-weight:500;border-bottom-right-radius:4px}
.msg.agent .msg-bbl h2{font-size:13px;color:var(--green);margin:8px 0 4px}
.msg.agent .msg-bbl strong{color:var(--green)}
.msg.agent .msg-bbl hr{border:none;border-top:1px solid var(--s3);margin:8px 0}
.msg.agent .msg-bbl em{color:var(--muted);font-style:italic}
.typing-dots{display:flex;gap:4px;padding:11px 13px}
.typing-dots span{width:5px;height:5px;background:var(--muted);border-radius:50%;animation:bounce 1.2s infinite ease-in-out}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
.chat-input-row{padding:10px 14px calc(14px + env(safe-area-inset-bottom,0px));border-top:1px solid var(--s3);display:flex;gap:8px;flex-shrink:0;background:#0a0a0a}
#chat-in{flex:1;background:var(--s2);border:1.5px solid var(--s3);border-radius:20px;padding:9px 14px;color:var(--text);font-size:13px;outline:none;font-family:inherit;resize:none;min-height:38px;max-height:90px;line-height:1.5}
#chat-in:focus{border-color:var(--green)}
#chat-in::placeholder{color:var(--muted)}
#chat-send{width:38px;height:38px;background:var(--green);border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;align-self:flex-end;transition:background .15s}
#chat-send:hover{background:var(--green-h)}
#chat-send:disabled{background:var(--s3);cursor:not-allowed}
#chat-send svg{fill:#000;width:15px;height:15px;margin-left:2px}

/* ── PLAYER BAR ── */
#player{height:88px;background:#181818;border-top:1px solid var(--s3);display:flex;align-items:center;padding:0 16px;gap:16px;flex-shrink:0}
.p-track{display:flex;align-items:center;gap:10px;width:230px;flex-shrink:0}
.p-art{width:48px;height:48px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;background:var(--s2)}
.p-info{overflow:hidden}
.p-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-artist{font-size:11px;color:var(--muted);margin-top:2px}
.p-heart{margin-left:10px;font-size:15px;color:var(--green);cursor:pointer;flex-shrink:0}
.p-controls{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px}
.p-btns{display:flex;align-items:center;gap:14px}
.pbtn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:4px;line-height:1}
.pbtn:hover{color:var(--text)}
.pbtn.play-btn{width:30px;height:30px;background:var(--text);color:#000;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px}
.pbtn.play-btn:hover{transform:scale(1.06)}
.p-prog{display:flex;align-items:center;gap:8px;width:100%;max-width:480px}
.p-time{font-size:10px;color:var(--muted);flex-shrink:0}
.p-track-bar{flex:1;height:4px;background:#535353;border-radius:2px;cursor:pointer}
.p-track-fill{height:100%;background:var(--text);border-radius:2px;width:32%}
.p-track-bar:hover .p-track-fill{background:var(--green)}
.p-vol{display:flex;align-items:center;gap:8px;width:180px;justify-content:flex-end}
.vol-icon{font-size:13px;color:var(--muted)}
.vol-bar{width:80px;height:4px;background:#535353;border-radius:2px;cursor:pointer}
.vol-fill{height:100%;background:var(--text);border-radius:2px;width:65%}

/* ── PROFILE PANEL ── */
#profile-dim{position:fixed;inset:0;background:rgba(0,0,0,0);pointer-events:none;z-index:240;transition:background .3s}
#profile-dim.show{background:rgba(0,0,0,.6);pointer-events:all}
#profile-panel{position:fixed;top:0;right:-440px;width:420px;height:100vh;background:#181818;border-left:1px solid var(--s3);display:flex;flex-direction:column;z-index:241;transition:right .3s ease;box-shadow:-6px 0 24px rgba(0,0,0,.6)}
#profile-panel.open{right:0}
.pp-head{padding:16px 18px;border-bottom:1px solid var(--s3);display:flex;align-items:center;gap:12px;flex-shrink:0}
.pp-icon{width:36px;height:36px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.pp-title{font-size:15px;font-weight:700}
.pp-sub{font-size:11px;color:var(--muted);margin-top:1px}
.pp-close{margin-left:auto;background:rgba(255,255,255,.1);border:none;color:var(--text);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pp-close:hover{background:rgba(255,255,255,.2)}
.pp-body{flex:1;overflow-y:auto;padding:16px 18px}
.pp-body::-webkit-scrollbar{width:4px}
.pp-body::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px}
.pp-footer{padding:12px 18px 16px;border-top:1px solid var(--s3);flex-shrink:0}
.pp-vibe{display:inline-block;background:rgba(29,185,84,.12);border:1px solid var(--green);color:var(--green);border-radius:20px;padding:5px 16px;font-size:13px;font-weight:700;margin-bottom:16px}
.pp-section{margin-bottom:18px}
.pp-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:8px}
.pp-tags{display:flex;flex-wrap:wrap;gap:6px}
.pp-tag{background:var(--s2);color:var(--text);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600}
.pp-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pp-stat{background:var(--s1);border-radius:8px;padding:10px 12px}
.pp-stat.full{grid-column:1/-1}
.pp-stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.pp-stat-val{font-size:13px;font-weight:700}
.pp-cat-head{display:flex;align-items:center;gap:8px;margin:16px 0 8px}
.pp-cat-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;white-space:nowrap}
.pp-cat-line{flex:1;height:1px;background:var(--s3)}
.pp-cat-badge{font-size:10px;font-weight:700;border-radius:10px;padding:2px 8px;white-space:nowrap}
.pp-regional .pp-cat-label{color:var(--green)}
.pp-regional .pp-cat-badge{background:rgba(29,185,84,.12);color:var(--green);border:1px solid rgba(29,185,84,.3)}
.pp-intl .pp-cat-label{color:#a78bfa}
.pp-intl .pp-cat-badge{background:rgba(167,139,250,.12);color:#a78bfa;border:1px solid rgba(167,139,250,.3)}
.pp-default .pp-cat-label{color:var(--muted)}
.pp-default .pp-cat-badge{background:var(--s2);color:var(--muted);border:1px solid var(--s3)}
.pp-artist{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.pp-artist-num{color:var(--muted);font-size:12px;width:14px;flex-shrink:0;padding-top:3px}
.pp-artist-art{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px}
.pp-artist-name{font-size:13px;font-weight:700}
.pp-artist-why{font-size:11px;color:var(--muted);line-height:1.4;margin-top:2px}

/* ── SHOW ALL COLLAPSED ── */
.cards.collapsed .card:nth-child(n+5){display:none}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  #sidebar{display:none}
  .quick-row{grid-template-columns:repeat(2,1fr)}
  .cards{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
  #chat-panel{width:100%;right:-100%;height:100vh;height:100dvh}
  #profile-panel{width:100%;right:-100%}
}
@media(max-width:580px){
  #content{padding:0 14px 100px}
  .hero{height:auto;min-height:200px;padding:20px}
  .hero-title{font-size:22px}
  .hero-sub{font-size:13px;margin-bottom:14px}
  .quick-row{grid-template-columns:1fr}
  .cards{grid-template-columns:repeat(2,1fr)}
  .sec-title{font-size:17px}
  #player{padding:0 10px;gap:8px}
  .p-track{width:auto;min-width:0;flex:1}
  .p-vol{display:none}
  .p-controls{flex:1}
}
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="logo">
      <svg viewBox="0 0 168 168"><path d="M84 0C37.6 0 0 37.6 0 84s37.6 84 84 84 84-37.6 84-84S130.4 0 84 0zm38.6 121.1c-1.5 2.5-4.8 3.3-7.3 1.7-20-12.2-45.2-15-74.9-8.2-2.9.7-5.7-1.1-6.4-4-.7-2.9 1.1-5.7 4-6.4 32.5-7.4 60.4-4.2 82.9 9.5 2.5 1.5 3.3 4.9 1.7 7.4zm10.3-22.9c-1.9 3.1-5.9 4-9 2.1-22.9-14.1-57.8-18.1-84.9-9.9-3.5 1.1-7.2-.9-8.3-4.4-1.1-3.5.9-7.2 4.4-8.3 30.9-9.4 69.3-4.8 95.7 11.3 3.1 1.9 4 5.9 2.1 9.2zm.9-23.8c-27.5-16.3-72.8-17.8-99-9.8-4.2 1.3-8.6-1.1-9.9-5.3-1.3-4.2 1.1-8.6 5.3-9.9 30.1-9.1 80.1-7.4 111.7 11.4 3.8 2.2 5 7.1 2.7 10.8-2.3 3.7-7.1 5-10.8 2.8z"/></svg>
      <span>Spotify</span>
    </div>
    <div class="nav-links">
      <div class="nav-link active">
        <svg viewBox="0 0 24 24"><path d="M12.5 3.247a1 1 0 0 0-1 0L4 7.577V20h4.5v-6a1 1 0 0 1 1-1h5a1 1 0 0 1 1 1v6H20V7.577l-7.5-4.33zm-2-1.732a3 3 0 0 1 3 0l7.5 4.33a2 2 0 0 1 1 1.732V21a1 1 0 0 1-1 1h-6.5a1 1 0 0 1-1-1v-6h-3v6a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V7.577a2 2 0 0 1 1-1.732l7.5-4.33z"/></svg>
        Home

<script>
// ── GRADIENTS ──────────────────────────────────────────────
const G=[
  'linear-gradient(135deg,#1a1a2e,#e94560)',
  'linear-gradient(135deg,#0d0221,#ff6b35)',
  'linear-gradient(135deg,#0a2e1a,#1DB954)',
  'linear-gradient(135deg,#2d1b69,#ff007f)',
  'linear-gradient(135deg,#0d0d0d,#00d4ff)',
  'linear-gradient(135deg,#1a0000,#cc3333)',
  'linear-gradient(135deg,#001a33,#3366ff)',
  'linear-gradient(135deg,#2a1500,#ff8800)',
];

// ── STATE ──────────────────────────────────────────────────
let onboarded=false;
let chatSid=null,chatMaxQ=7,chatQ=0,chatDone=false,chatBusy=false;
let nudgeSkips=0,nudgeTimer=null;
let scrollNudgeFired=false,cardHoverCount=0,cardHoverNudgeFired=false;
let cardsHovered=new Set(),skippedNudgeFired=false;
let profileData={vibe:'',genres:[],energy:'',context:'',discovery:'',artists:[]};

// ── CONTENT DATA ───────────────────────────────────────────
const BEFORE={
  hero:{bg:'linear-gradient(150deg,#121212 0%,#1a3a22 60%,#0d2016 100%)',tag:'Welcome to Spotify',title:'Your music journey\nstarts here',sub:"Tell us what you love and we'll build the perfect soundtrack for your life.",btn:'Set up your taste profile'},
  sections:[
    {title:'Trending Right Now',type:'cards',items:[
      {n:"Today's Top Hits",d:'The most played songs today',e:'🔥',g:G[0]},
      {n:'Global Top 50',d:'Your daily update of the most played tracks right now',e:'🌍',g:G[1]},
      {n:'New Music Friday',d:'The best new music, one day early',e:'🎶',g:G[2]},
      {n:'Viral Hits',d:'Songs breaking through right now',e:'📈',g:G[3]},
      {n:'Pop Rising',d:"Tomorrow's hits today",e:'⭐',g:G[4]},
      {n:'Hot Country',d:'The hottest country songs right now',e:'🤠',g:G[5]},
    ]},
    {title:'Popular Genres to Explore',type:'cards',items:[
      {n:'Pop',d:'Chart-topping, feel-good hits',e:'🎤',g:G[2]},
      {n:'Hip-Hop',d:'The best in rap and hip-hop',e:'🎧',g:G[0]},
      {n:'Indie',d:'Discover independent music',e:'🎸',g:G[3]},
      {n:'Electronic',d:'Beats, synths, and beyond',e:'⚡',g:G[4]},
      {n:'R&B',d:'Soul, rhythm and blues',e:'🎵',g:G[1]},
      {n:'Rock',d:'Classic and contemporary rock',e:'🤘',g:G[5]},
    ]},
  ],
};

const AFTER={
  hero:{bg:'linear-gradient(135deg,#0a2e1a 0%,#1DB954 100%)',tag:'Personalised For You',title:"Welcome to your\nspotlight, Alex",sub:"Your taste profile is live. Here's music we think you'll love.",btn:'Update your taste profile'},
  library:[{n:'Liked Songs',d:'Playlist',e:'💚',g:'linear-gradient(135deg,#450af5,#c4efd9)'}],
  sections:[
    {title:'✨ Based on Your Taste Profile',type:'cards',hl:true,circle:true,items:[
      {n:'Hozier',d:'Folk-soul with dark, literary edge — matches your deep listening preference',e:'🎸',g:G[0]},
      {n:'Phoebe Bridgers',d:'Atmospheric indie with emotional storytelling',e:'🌙',g:G[3]},
      {n:'Bon Iver',d:'Introspective folk that pairs with your evening wind-down',e:'🌲',g:G[2]},
      {n:'The National',d:'Literary indie rock with cerebral lyrics',e:'📖',g:G[1]},
      {n:'Fleet Foxes',d:'Harmonically rich folk perfect for your calm sessions',e:'🦊',g:G[4]},
    ]},
    {title:"Made for Alex · Daily Mixes",type:'cards',items:[
      {n:'Daily Mix 1',d:'Hozier, Bon Iver, Phoebe Bridgers and more',e:'1️⃣',g:G[0]},
      {n:'Daily Mix 2',d:'Chill indie for focus and evenings',e:'🌙',g:G[3]},
      {n:'Discovery Mix',d:"Fresh artists we think you'll love",e:'🔭',g:G[2]},
      {n:'Mood Boost',d:'Upbeat picks for when you need energy',e:'⚡',g:G[5]},
    ]},
    {title:'Artists You Might Like',type:'cards',circle:true,items:[
      {n:'Sufjan Stevens',d:'Orchestral indie folk with cinematic depth',e:'🎺',g:G[6]},
      {n:'Iron & Wine',d:'Acoustic folk with hushed, intimate songwriting',e:'🌾',g:G[7]},
      {n:'Big Thief',d:'Emotionally raw indie folk with vivid storytelling',e:'🌿',g:G[2]},
      {n:'Adrianne Lenker',d:"Stripped-back songwriting at its most personal",e:'🍂',g:G[1]},
      {n:'Angel Olsen',d:'Shape-shifting indie from lo-fi folk to lush orchestral pop',e:'🌙',g:G[4]},
    ]},
  ],
};

// ── RENDER ─────────────────────────────────────────────────
function render(){
  const el=document.getElementById('content');
  el.innerHTML='';
  const d=onboarded?AFTER:BEFORE;

  // hero
  const hero=document.createElement('div');
  hero.className='hero';
  hero.innerHTML=`
    <div class="hero-bg" style="background:${d.hero.bg}"></div>
    <div class="hero-inner">
      <div class="hero-tag">${d.hero.tag}</div>
      <div class="hero-title">${d.hero.title}</div>
      <div class="hero-sub">${d.hero.sub}</div>
      <div class="hero-btns">
        ${onboarded
          ?`<button class="btn-g" onclick="openProfile()">View your taste profile</button><button class="btn-o" onclick="openChat()">Update your taste profile</button>`
          :(d.hero.btn?`<button class="btn-g" onclick="openChat()">${d.hero.btn}</button>`:'')}
      </div>
    </div>`;
  el.appendChild(hero);

  // success banner
  if(onboarded){
    const b=document.createElement('div');
    b.className='banner-ok';
    b.innerHTML=`<div class="ok-icon">✅</div><div><div class="ok-title">Taste profile created</div><div class="ok-sub">Your home feed is now personalised to your answers</div></div>`;
    el.appendChild(b);
  }

  // library
  renderLibrary(onboarded?(AFTER.library||[]):[]);

  // sections
  d.sections.forEach(sec=>{
    const wrap=document.createElement('div');
    wrap.className=sec.hl?'section hl':'section';
    const hasMore=sec.type!=='quick'&&sec.items&&sec.items.length>4;
    const head=document.createElement('div');
    head.className='sec-head';
    const showAllEl=hasMore?'<span class="sec-link" data-toggle>Show all</span>':'';
    head.innerHTML=`<div class="sec-title">${sec.title}</div>${showAllEl}`;
    wrap.appendChild(head);
    if(sec.type==='quick'){
      const row=document.createElement('div');row.className='quick-row';
      sec.items.forEach(item=>{
        const q=document.createElement('div');q.className='qcard';q.onclick=()=>play(item);
        q.innerHTML=`<div class="q-art" style="background:${item.g}">${item.e}</div><div class="q-name">${item.n}</div>`;
        row.appendChild(q);
      });
      wrap.appendChild(row);
    }else{
      const grid=document.createElement('div');
      grid.className=hasMore?'cards collapsed':'cards';
      sec.items.forEach(item=>{
        const c=document.createElement('div');c.className='card';
        c.onclick=()=>{
          play(item);
          // clicking resets "all skipped" tracking
          cardsHovered.clear();skippedNudgeFired=false;
        };
        const aClass='card-art'+(sec.circle?' circle':'');
        c.innerHTML=`<div class="${aClass}" style="background:${item.g}">${item.e}<div class="play-fab"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div><div class="card-name">${item.n}</div><div class="card-desc">${item.d||''}</div>`;
        // Signal 5 — card hover without profile
        if(!onboarded) c.addEventListener('mouseenter',()=>{
          if(cardHoverNudgeFired)return;
          cardHoverCount++;
          if(cardHoverCount>=2){cardHoverNudgeFired=true;showNudge('Like the look of this?','Set up your profile to see more like it');}
        });
        // Signal 2 — all recommendations skipped (with profile)
        if(onboarded) c.addEventListener('mouseenter',()=>{
          if(skippedNudgeFired)return;
          cardsHovered.add(item.n);
          if(cardsHovered.size>=3){skippedNudgeFired=true;showNudgeUpdate('Not feeling these picks?','Your taste may have shifted — update your profile');}
        });
        grid.appendChild(c);
      });
      wrap.appendChild(grid);
      if(hasMore){
        head.querySelector('[data-toggle]').onclick=function(){
          grid.classList.toggle('collapsed');
          this.textContent=grid.classList.contains('collapsed')?'Show all':'Show less';
        };
      }
    }
    el.appendChild(wrap);
  });
  if(onboarded) hideNudge();
}

function renderLibrary(items){
  const el=document.getElementById('lib-items');
  el.innerHTML='';
  if(!items.length){
    el.innerHTML=`<div style="padding:10px 8px;font-size:12px;color:var(--muted)">No playlists yet. <span style="color:var(--green);cursor:pointer" onclick="openChat()">Set up your taste profile →</span></div>`;
    return;
  }
  items.forEach(item=>{
    const d=document.createElement('div');d.className='lib-item';d.onclick=()=>play(item);
    d.innerHTML=`<div class="lib-art" style="background:${item.g}">${item.e}</div><div><div class="lib-name">${item.n}</div><div class="lib-meta">${item.d||''}</div></div>`;
    el.appendChild(d);
  });
}

// ── NUDGE ──────────────────────────────────────────────────
function scheduleNudge(){
  clearTimeout(nudgeTimer);
  nudgeTimer=setTimeout(()=>{
    if(!onboarded) showNudge('Set up your taste profile','Takes 2 minutes · Instantly better recommendations');
  },4000);
}
function showNudge(title,sub,btnLabel='Start',btnAction=null){
  document.getElementById('n-title').textContent=title;
  document.getElementById('n-sub').textContent=sub;
  const btn=document.getElementById('nudge-go-btn');
  btn.textContent=btnLabel;
  btn.onclick=btnAction||(()=>{hideNudge();openChat();});
  document.getElementById('nudge').classList.add('show');
}
function showNudgeUpdate(title,sub){
  showNudge(title,sub,'Update',()=>{hideNudge();openChat();});
}
function hideNudge(){document.getElementById('nudge').classList.remove('show');}
function nudgeSkip(){
  hideNudge();
  nudgeSkips++;
  if(nudgeSkips>=3&&!onboarded){
    setTimeout(()=>showNudge('Help us understand you better — takes 2 minutes',"Your recommendations keep missing. Let's fix that."),5000);
  }
}

// ── SEARCH NUDGE (signal 1 with-profile / signal for without-profile) ──
let searchT=null;
function onSearchKey(e){
  if(e.key!=='Enter')return;
  const q=document.getElementById('search-in').value.trim();
  if(!q)return;
  clearTimeout(searchT);
  if(!onboarded){
    searchT=setTimeout(()=>showNudge(`Couldn't find results for "${q}"`,'Your taste profile would help us show better matches'),1500);
  }else{
    searchT=setTimeout(()=>showNudgeUpdate('Still searching?','Your recommendations may need a refresh — update your taste profile'),1500);
  }
}

// ── SCROLL DEPTH (signal 4 — without profile) ──────────────
function onScrollDepth(){
  if(scrollNudgeFired||onboarded)return;
  if(document.getElementById('content').scrollTop>220){
    scrollNudgeFired=true;
    showNudge('The more we know you, the better these get','Set up your taste profile in 2 minutes');
    document.getElementById('content').removeEventListener('scroll',onScrollDepth);
  }
}

// ── CHAT ───────────────────────────────────────────────────
function openChat(){
  hideNudge();
  clearTimeout(nudgeTimer);
  document.getElementById('chat-msgs').innerHTML='';
  document.getElementById('cp-fill').style.width='0%';
  document.getElementById('cp-label').textContent='Starting…';
  document.getElementById('chat-in').disabled=true;
  document.getElementById('chat-send').disabled=true;
  chatSid=null;chatQ=0;chatDone=false;chatBusy=false;
  document.getElementById('chat-panel').classList.add('open');
  startChat();
}
function closeChat(){document.getElementById('chat-panel').classList.remove('open');}

async function startChat(){
  showTyping();
  try{
    const r=await fetch('/api/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mode:'day_zero'})});
    const d=await r.json();
    if(!r.ok)throw new Error(d.detail||'Failed to start');
    chatSid=d.session_id;chatMaxQ=d.max_questions;chatQ=1;
    removeTyping();addMsg('agent',d.message);updateProg(1,chatMaxQ);enableIn();
  }catch(e){
    removeTyping();
    addMsg('agent','⚠️ '+e.message+'\n\n*Make sure ANTHROPIC_API_KEY is set in Railway → Variables.*');
  }
}

async function sendChat(){
  if(chatBusy||chatDone||!chatSid)return;
  const inp=document.getElementById('chat-in');
  const txt=inp.value.trim();if(!txt)return;
  inp.value='';autoResize(inp);
  addMsg('user',txt);disableIn();showTyping();
  try{
    const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:chatSid,message:txt})});
    const d=await r.json();
    if(!r.ok)throw new Error(d.detail||'Chat error');
    chatQ=d.question_count;chatDone=d.is_complete;
    removeTyping();addMsg('agent',d.message);
    updateProg(Math.min(chatQ-1,chatMaxQ),chatMaxQ);
    if(chatDone){
      onboarded=true;
      clearTimeout(nudgeTimer);
      hideNudge();
      applyProfileToFeed(d.message);
      saveState();
      document.getElementById('chat-in').disabled=true;
      document.getElementById('chat-send').disabled=true;
      document.getElementById('cp-label').textContent='Profile ready ✓';
      setTimeout(()=>{
        closeChat();
        render();
        document.getElementById('content').scrollTop=0;
      },5000);
    }else{enableIn();}
  }catch(e){removeTyping();addMsg('agent','⚠️ '+e.message);enableIn();}
}

function addMsg(role,text){
  const el=document.getElementById('chat-msgs');
  const div=document.createElement('div');div.className='msg '+role;
  if(role==='agent'){const av=document.createElement('div');av.className='msg-av';av.textContent='S';div.appendChild(av);}
  const b=document.createElement('div');b.className='msg-bbl';b.innerHTML=md(text);div.appendChild(b);
  el.appendChild(div);el.scrollTop=el.scrollHeight;
}
function md(t){
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/^---$/gm,'<hr>')
    .replace(/\n/g,'<br>');
}
function showTyping(){
  chatBusy=true;
  const el=document.getElementById('chat-msgs');
  const d=document.createElement('div');d.className='msg agent';d.id='typing-msg';
  const av=document.createElement('div');av.className='msg-av';av.textContent='S';
  const b=document.createElement('div');b.className='msg-bbl';
  b.innerHTML='<div class="typing-dots"><span></span><span></span><span></span></div>';
  d.appendChild(av);d.appendChild(b);el.appendChild(d);el.scrollTop=el.scrollHeight;
}
function removeTyping(){chatBusy=false;const e=document.getElementById('typing-msg');if(e)e.remove();}
function updateProg(cur,max){
  document.getElementById('cp-fill').style.width=(max>0?Math.min(cur/max*100,100):0)+'%';
  let label;
  if(cur>=max) label='Profile ready ✓';
  else if(cur<=2) label='Getting to know you…';
  else if(cur<=4) label='Learning your context…';
  else label='Finding your sound…';
  document.getElementById('cp-label').textContent=label;
}
function enableIn(){document.getElementById('chat-in').disabled=false;document.getElementById('chat-send').disabled=false;document.getElementById('chat-in').focus();}
function disableIn(){document.getElementById('chat-in').disabled=true;document.getElementById('chat-send').disabled=true;}
function chatKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat();}}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,90)+'px';}

// ── PROFILE PARSER ─────────────────────────────────────────
function applyProfileToFeed(text){
  const emojis=['🎵','🎶','🎸','🎤','🎧','🎺','🎻','🥁'];
  const artists=[];
  text.split('\n').forEach(line=>{
    const t=line.trim();
    // Try tagged format: 1. **Artist** [Regional] — desc
    let m=t.match(/^\d+[\.\)]\s*\*\*(.+?)\*\*\s*\[(Regional|International)\]\s*[—–\-]+\s*(.+)$/);
    if(m&&artists.length<5){artists.push({n:m[1].trim(),cat:m[2],d:m[3].trim(),e:emojis[artists.length],g:G[artists.length],idx:artists.length+1});return;}
    // Fallback: no tag
    m=t.match(/^\d+[\.\)]\s*\*\*(.+?)\*\*\s*[—–\-]+\s*(.+)$/);
    if(m&&artists.length<5) artists.push({n:m[1].trim(),cat:null,d:m[2].trim(),e:emojis[artists.length],g:G[artists.length],idx:artists.length+1});
  });
  if(artists.length) AFTER.sections[0].items=artists.map(a=>({n:a.n,d:a.d,e:a.e,g:a.g}));

  const vibe=((text.match(/\*\*Vibe\*\*[:\s]+(.+)/)||[])[1]||'').trim();
  const genreRaw=((text.match(/\*\*Core Genres\*\*[:\s]+(.+)/)||[])[1]||'').trim();
  const genres=genreRaw?genreRaw.split(/[,·]/).map(s=>s.trim()).filter(Boolean):[];
  const energy=((text.match(/\*\*Energy Level\*\*[:\s]+(.+)/)||[])[1]||'').trim();
  const context=((text.match(/\*\*Listening Context\*\*[:\s]+(.+)/)||[])[1]||'').trim();
  const discovery=((text.match(/\*\*Discovery Appetite\*\*[:\s]+(.+)/)||[])[1]||'').trim();

  profileData={vibe,genres,energy,context,discovery,artists};

  const parts=[];
  if(vibe) parts.push(vibe);
  if(genres.length) parts.push(genres.join(', '));
  if(parts.length) AFTER.hero.sub=`Your taste profile is live · ${parts.join(' · ')}. Here's music we think you'll love.`;
}

// ── PROFILE PANEL ──────────────────────────────────────────
function openProfile(){
  renderProfilePanel();
  document.getElementById('profile-dim').classList.add('show');
  document.getElementById('profile-panel').classList.add('open');
}
function closeProfile(){
  document.getElementById('profile-dim').classList.remove('show');
  document.getElementById('profile-panel').classList.remove('open');
}

function renderProfilePanel(){
  const body=document.getElementById('pp-body');
  body.innerHTML='';
  const p=profileData;

  if(p.vibe){
    const d=document.createElement('div');
    d.innerHTML=`<span class="pp-vibe">${p.vibe}</span>`;
    body.appendChild(d);
  }

  if(p.genres.length){
    const s=document.createElement('div');s.className='pp-section';
    s.innerHTML=`<div class="pp-label">Core genres</div><div class="pp-tags">${p.genres.map(g=>`<span class="pp-tag">${g}</span>`).join('')}</div>`;
    body.appendChild(s);
  }

  const stats=[];
  if(p.energy) stats.push({l:'Energy level',v:p.energy});
  if(p.discovery) stats.push({l:'Discovery',v:p.discovery});
  if(p.context) stats.push({l:'Listening context',v:p.context,full:true});
  if(stats.length){
    const s=document.createElement('div');s.className='pp-section';
    s.innerHTML=`<div class="pp-label">Profile</div><div class="pp-stats">${stats.map(st=>`<div class="pp-stat${st.full?' full':''}"><div class="pp-stat-label">${st.l}</div><div class="pp-stat-val">${st.v}</div></div>`).join('')}</div>`;
    body.appendChild(s);
  }

  if(p.artists.length){
    const s=document.createElement('div');s.className='pp-section';
    s.innerHTML='<div class="pp-label">Your picks</div>';
    const regional=p.artists.filter(a=>a.cat==='Regional');
    const intl=p.artists.filter(a=>a.cat==='International');
    const other=p.artists.filter(a=>!a.cat);
    function catHtml(list,cls,label,badge){
      if(!list.length) return '';
      return `<div class="pp-cat-head ${cls}"><span class="pp-cat-label">${label}</span><div class="pp-cat-line"></div><span class="pp-cat-badge">${badge}</span></div>`
        +list.map(a=>`<div class="pp-artist"><div class="pp-artist-num">${a.idx}</div><div class="pp-artist-art" style="background:${a.g}">${a.e}</div><div><div class="pp-artist-name">${a.n}</div><div class="pp-artist-why">${a.d}</div></div></div>`).join('');
    }
    s.innerHTML+=catHtml(regional,'pp-regional','Regional','South Indian')
      +catHtml(intl,'pp-intl','International','Global')
      +catHtml(other,'pp-default','Also for you','Picks');
    body.appendChild(s);
  }
}

// ── PERSISTENCE ────────────────────────────────────────────
function saveState(){
  localStorage.setItem('sp_onboarded', localStorage.getItem('sp_onboarded')||String(Date.now()));
  localStorage.setItem('sp_profile', JSON.stringify(profileData));
}

function restoreState(){
  const ts=localStorage.getItem('sp_onboarded');
  const saved=localStorage.getItem('sp_profile');
  if(!ts||!saved)return;
  try{
    profileData=JSON.parse(saved);
    onboarded=true;
    if(profileData.artists&&profileData.artists.length)
      AFTER.sections[0].items=profileData.artists.map(a=>({n:a.n,d:a.d,e:a.e,g:a.g}));
    const parts=[];
    if(profileData.vibe) parts.push(profileData.vibe);
    if(profileData.genres&&profileData.genres.length) parts.push(profileData.genres.join(', '));
    if(parts.length) AFTER.hero.sub=`Your taste profile is live · ${parts.join(' · ')}. Here's music we think you'll love.`;
  }catch(e){}
}

// ── NUDGE INIT (all 6 signals) ─────────────────────────────
function initNudges(){
  const isNewSession=!sessionStorage.getItem('sp_session');
  sessionStorage.setItem('sp_session','1');
  const prevVisited=localStorage.getItem('sp_visited');
  localStorage.setItem('sp_visited',String(Date.now()));

  if(!onboarded){
    // Signal 1 — time on page (existing scheduleNudge)
    scheduleNudge();
    // Signal 6 — return visit
    if(isNewSession&&prevVisited)
      setTimeout(()=>{if(!onboarded)showNudge('Welcome back — your profile is still waiting','Pick up where you left off · takes 2 minutes');},2000);
    // Signal 4 — scroll depth
    document.getElementById('content').addEventListener('scroll',onScrollDepth,{passive:true});
    // Signals 5 (card hover) wired in render()
  }else{
    // Signal 3 — profile age 30+ days (proactive)
    const profileTs=parseInt(localStorage.getItem('sp_onboarded')||'0');
    if(isNewSession&&profileTs){
      const days=(Date.now()-profileTs)/(1000*60*60*24);
      if(days>=30)
        setTimeout(()=>showNudgeUpdate('Your taste profile is a month old','Music moves fast — want to refresh it?'),3000);
    }
    // Signals 1 (failed search) and 2 (all skipped) wired in onSearchKey + render()
  }
}

// ── PLAYER ─────────────────────────────────────────────────
function play(item){
  document.getElementById('p-track-name').textContent=item.n;
  document.getElementById('p-artist').textContent=item.d||'Spotify';
  document.getElementById('p-art').style.background=item.g;
  document.getElementById('p-art').textContent=item.e;
}

// ── INIT ───────────────────────────────────────────────────
restoreState();
render();
initNudges();
</script>
</body>
